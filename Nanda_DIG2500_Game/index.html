<!DOCTYPE html>
<html>
<body>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles/gumballStyles.css">
    <title style="text-align:center;">Pause</title>
    <header>
        <h1 style="text-align:center;">Pause</h1>
        <p style="text-align:center;">Game is paused</p>
    </header>

    <main class="pause-layout">
        <div class="menu-container">
            <button>Resume</button>
            <button>Inventory</button>
            <button>Settings</button>
            <button>Quit</button>
        </div>

        <figure class="image-container">
            <img src="content/art.png" />
            <section class="card">
                <p>
                    Health: 100% |
                    Attack: 30% |
                    Defense: 50%
                </p>
            </section>
        </figure>

    </main>

    <section class="copyright">
        <p>
            @VAMBZ <br />
            Characters from @VAMBZ
        </p>
    </section>

    <section class="footer">
        <p> Resources and Tutorials: </p>
        <ul>
            <li> <a href="https://www.w3schools.com/w3css/w3css_buttons.asp">Buttons</a></li>
            <li> <a href="https://egghead.io/lessons/css-animate-a-button-on-hover-with-a-css-transform">Button Animation</a></li>
            <li> <a href="https://www.youtube.com/watch?v=eZukhA4b_Ns">Changing Button Shape</a></li>
        </ul>
    </section>

</body>
</html>
